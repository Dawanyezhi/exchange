server.port=8080
spring.application.name=exchange-matching

laser.aeron.cluster.config.nodeId=0
laser.aeron.cluster.config.baseDir=/Users/dawanyezhi/temp/aeron
laser.aeron.cluster.config.channelPrefix=aeron:udp?endpoint=localhost:
laser.aeron.cluster.config.clusterNodeSize=3
laser.aeron.cluster.config.nodeIp=localhost

# Request 序号连续性校验开关 (true=严格校验, false=测试时跳过)
laser.matching.validation.serial-check-enabled=true

# 快照：定时周期 (ms)，默认 5 分钟；首次延迟 (ms)，默认 1 分钟
laser.matching.snapshot.scheduler-enabled=true
laser.matching.snapshot.interval-ms=300000
laser.matching.snapshot.initial-delay-ms=60000

# MatchResult 可靠结果日志。matching 只写 Archive；实时推送和 replay 由独立 result-publisher 服务负责。
laser.matching.result-log.channel=aeron:ipc
laser.matching.result-log.stream-id=1001
laser.matching.result-log.commit-timeout-ms=3000

# 市价单保护：bps=万分比，min-trade-base-qty 用于撮合防尘
laser.matching.market-order.protection-bps=500
laser.matching.market-order.min-trade-base-qty=0.00000001
